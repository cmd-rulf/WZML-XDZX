# ============================================================
#  qBittorrent.conf — ADVANCED HIGH PERFORMANCE CONFIG
#  Optimized for: Heroku / Low-RAM VPS / Telegram Leech Bot
#  Author: Optimized for RAVI KUMAR (Telegram Leech Bot)
#  Based on: libtorrent tuning + community benchmarks
# ============================================================

[Application]
# Heroku dynos have limited RAM — keep this at 1024 for dyno health
MemoryWorkingSetLimit=1024

[BitTorrent]
# ── Tracker & Announce ──────────────────────────────────────
Session\AddExtensionToIncompleteFiles=false
Session\AddTrackersEnabled=true
Session\AnnounceIP=
Session\AnnounceToAllTiers=true
Session\AnnounceToAllTrackers=true
Session\AnonymousModeEnabled=false

# ── I/O Threads (SSD/NVMe = 8-16, HDD/Heroku ephemeral = 4) ──
# Heroku uses ephemeral SSD — 8 is the sweet spot
Session\AsyncIOThreadsCount=8

# ── Peer / Connection ────────────────────────────────────────
Session\ConnectionSpeed=40
Session\DHTEnabled=true
Session\DHTPort=6881
Session\GlobalDLSpeedLimit=0
Session\GlobalUPSpeedLimit=0
Session\GlobalMaxRatio=-1
Session\GlobalMaxSeedingMinutes=-1
Session\IgnoreSlowTorrentsForQueueing=true
Session\IncludeOverheadInLimits=false
Session\LSDEnabled=true
Session\MaxActiveCheckingTorrents=3
Session\MaxActiveDownloads=1000
Session\MaxActiveTorrents=1000
Session\MaxActiveUploads=1000
Session\MaxConnections=-1
Session\MaxConnectionsPerTorrent=-1
Session\MaxRatioAction=0
Session\MaxUploads=-1
Session\MaxUploadsPerTorrent=-1
Session\MultiConnectionsPerIp=true
Session\PexEnabled=true
Session\PerformanceWarning=false

# ── Disk & Cache (CRITICAL for speed) ───────────────────────
# Fixed 512 MB cache — vastly better than -1 auto on Heroku
Session\DiskCacheSize=512
Session\DiskCacheTTL=300
# Coalesce multiple small writes → fewer I/O calls → faster
Session\CoalesceReadWrite=true
# Preallocation false = instant download start (leech bot friendly)
Session\Preallocation=false
# File pool: how many files can be open simultaneously
Session\FilePoolSize=500
# Outstanding memory when checking (reduce hash check time)
Session\CheckingMemUsageSize=256
# Disk queue depth for async I/O
Session\DiskQueueSize=8192

# ── Disk I/O Mode (enable OS cache for best Heroku perf) ────
Session\UseOSCache=true
Session\PieceExtentAffinity=true

# ── Network Send Buffer (MOST IMPACTFUL SETTINGS) ───────────
# Default 500 KB watermark starves fast connections
# 4096 KB watermark = up to 100 MB/s sustained upload/download
Session\SendBufferWatermark=4096
Session\SendBufferLowWatermark=512
Session\SendBufferWatermarkFactor=150
Session\SocketBacklogSize=300

# ── Hashing ─────────────────────────────────────────────────
# 4 threads = faster recheck on large files
Session\HashingThreadsCount=4

# ── Torrent Behavior ─────────────────────────────────────────
Session\QueueingSystemEnabled=false
Session\SlowTorrentsDownloadRate=2
Session\SlowTorrentsInactivityTimer=600
Session\SlowTorrentsUploadRate=2
Session\StopTrackerTimeout=5

# ── Peer Exchange & Encryption ──────────────────────────────
Session\Encryption=1
Session\SuggestMode=true
Session\IDNSupportEnabled=true

# ── Torrent Export / Completion ──────────────────────────────
TrackerEnabled=true

[LegalNotice]
Accepted=true

[Meta]
MigrationVersion=8

[Preferences]
# ── Misc ─────────────────────────────────────────────────────
Advanced\DisableRecursiveDownload=false
# Auto recheck on completion (data integrity)
Advanced\RecheckOnCompletion=true
Advanced\trackerPortForwarding=true
General\PreventFromSuspendWhenDownloading=true
General\PreventFromSuspendWhenSeeding=true
Search\SearchEnabled=true

# ── WebUI (Heroku / Bot-friendly) ────────────────────────────
WebUI\Address=*
WebUI\BanDuration=3600
WebUI\CSRFProtection=false
WebUI\ClickjackingProtection=false
WebUI\Enabled=true
WebUI\HTTPS\Enabled=false
WebUI\HostHeaderValidation=false
WebUI\LocalHostAuth=false
WebUI\MaxAuthenticationFailCount=1000
WebUI\Port=8090
WebUI\SecureCookie=false
WebUI\UseUPnP=false
WebUI\Username=admin
